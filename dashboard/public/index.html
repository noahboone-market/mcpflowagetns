<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MCP Command Center — Real-time mission control for your MCP servers.">
    <title>MCP Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background layers -->
    <div id="grid-background" aria-hidden="true"></div>
    <div id="ambient-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div id="noise-overlay" aria-hidden="true"></div>

    <!-- Top Bar -->
    <header id="top-bar">
        <div class="top-bar-left">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
            </svg>
            <span class="top-bar-title">MCP Command Center</span>
        </div>
        <div class="top-bar-stats">
            <div class="agg-stat">
                <span class="agg-value" id="stat-servers">0/0</span>
                <span class="agg-label">Online</span>
            </div>
            <div class="agg-divider"></div>
            <div class="agg-stat">
                <span class="agg-value" id="stat-tools">0</span>
                <span class="agg-label">Tools</span>
            </div>
            <div class="agg-divider"></div>
            <div class="agg-stat">
                <span class="agg-value" id="stat-messages">0/s</span>
                <span class="agg-label">Traffic</span>
            </div>
            <div class="agg-divider"></div>
            <div class="agg-stat">
                <span class="agg-value" id="stat-uptime">00:00:00</span>
                <span class="agg-label">Uptime</span>
            </div>
        </div>
        <div class="top-bar-right">
            <div id="ws-status" class="ws-indicator">
                <span class="ws-dot"></span>
                <span class="ws-label">Connecting...</span>
            </div>
            <button type="button" class="btn btn-sm" id="btn-add-server">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Server
            </button>
        </div>
    </header>

    <!-- Command Floor -->
    <div id="command-floor">
        <svg id="connections-svg" xmlns="http://www.w3.org/2000/svg"></svg>

        <!-- Central Core -->
        <div id="central-core">
            <div class="core-ring core-ring-outer"></div>
            <div class="core-ring core-ring-mid"></div>
            <div class="core-ring core-ring-inner"></div>
            <div class="core-body">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11.99 18.54l-7.37-5.73L3 14.07l9 7 9-7-1.63-1.27-7.38 5.74zM12 16l7.36-5.73L21 9l-9-7-9 7 1.63 1.27L12 16z"/>
                </svg>
                <div class="core-label">ROUTER</div>
                <div class="core-stat" id="core-connected">0 online</div>
            </div>
        </div>

        <!-- Stations rendered by JS -->
        <div id="stations-container"></div>
    </div>

    <!-- Activity Feed -->
    <div id="activity-feed">
        <div class="feed-label">
            <span class="feed-dot"></span>
            LIVE
        </div>
        <div id="feed-ticker"></div>
        <div class="feed-empty" id="feed-empty">Waiting for traffic...</div>
    </div>

    <!-- Station Overlay -->
    <div id="station-overlay" class="overlay hidden" role="dialog" aria-label="Server details">
        <div class="overlay-backdrop"></div>
        <div class="overlay-card">
            <div class="overlay-header">
                <div class="overlay-title-row">
                    <h2 id="overlay-name"></h2>
                    <span id="overlay-badge" class="transport-badge"></span>
                    <span id="overlay-status" class="status-badge"></span>
                </div>
                <button type="button" class="btn-icon" id="btn-close-overlay" aria-label="Close">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <!-- Tabs -->
            <div class="overlay-tab-bar">
                <button type="button" class="ov-tab active" data-tab="tools">
                    Tools <span id="ov-tools-count" class="tab-count">0</span>
                </button>
                <button type="button" class="ov-tab" data-tab="resources">
                    Resources <span id="ov-resources-count" class="tab-count">0</span>
                </button>
                <button type="button" class="ov-tab" data-tab="prompts">
                    Prompts <span id="ov-prompts-count" class="tab-count">0</span>
                </button>
            </div>

            <div id="overlay-tab-content" class="overlay-body"></div>

            <!-- Tool Tester -->
            <div id="overlay-tester" class="ov-tester hidden">
                <div class="tester-header">
                    <h3 id="ov-tester-name"></h3>
                    <button type="button" class="btn-icon" id="btn-close-tester" aria-label="Close tester">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <p id="ov-tester-desc" class="tester-desc"></p>
                <form id="ov-tester-form"></form>
                <div class="tester-actions">
                    <button type="button" class="btn btn-primary btn-sm" id="btn-execute">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        Execute
                    </button>
                    <span id="exec-duration" class="exec-duration"></span>
                </div>
                <div id="ov-tool-result" class="tool-result hidden">
                    <div class="result-header">Result</div>
                    <pre id="ov-result-body" class="result-body"></pre>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Server Modal -->
    <div id="add-server-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Add MCP Server</h3>
                <button type="button" class="btn-icon" id="btn-close-modal" aria-label="Close">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="add-server-form">
                <div class="form-group">
                    <label for="server-name">Server Name</label>
                    <input type="text" id="server-name" placeholder="my-server" required>
                </div>
                <div class="form-group">
                    <label for="transport-type">Transport</label>
                    <select id="transport-type">
                        <option value="stdio">stdio (command)</option>
                        <option value="http">HTTP (URL)</option>
                    </select>
                </div>
                <div id="stdio-fields">
                    <div class="form-group">
                        <label for="server-command">Command</label>
                        <input type="text" id="server-command" placeholder="npx">
                    </div>
                    <div class="form-group">
                        <label for="server-args">Arguments <span class="hint">(comma separated)</span></label>
                        <input type="text" id="server-args" placeholder="-y, @modelcontextprotocol/server-filesystem, /tmp">
                    </div>
                </div>
                <div id="http-fields" class="hidden">
                    <div class="form-group">
                        <label for="server-url">URL</label>
                        <input type="url" id="server-url" placeholder="https://example.com/mcp">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-ghost btn-sm" id="btn-cancel-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-sm">Add Server</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
